<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المكتب الفني — إدارة المشاريع</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
:root{
  --bg:#060d18;--s1:#0d1626;--s2:#111e30;--s3:#172340;
  --border:#1c2e47;--border2:#243852;
  --accent:#00c6ff;--accent2:#0057e7;
  --green:#00e676;--orange:#ffab00;--red:#ff4d4d;--purple:#a78bfa;--teal:#00bfa5;
  --text:#dde8f5;--text2:#7a94b4;--text3:#3a5070;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,86,231,0.07),transparent);pointer-events:none;z-index:0}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,198,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,198,255,0.02) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1px solid var(--border2);border-radius:20px;padding:40px;width:360px;text-align:center;animation:fadeIn .4s ease;position:relative;z-index:1}
.login-logo{margin-bottom:10px;display:flex;justify-content:center}
.login-box h2{font-size:21px;font-weight:900;margin-bottom:4px}
.login-box p{font-size:12px;color:var(--text2);margin-bottom:26px}
.login-tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--s2);border-radius:10px;padding:4px}
.login-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;transition:all .2s}
.login-tab.active{background:var(--accent2);color:#fff}
.login-field{margin-bottom:16px;text-align:right}
.login-field label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:600}
.login-field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--accent2)}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:10px;color:#fff;font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,87,231,.4)}
.login-error{color:var(--red);font-size:12px;margin-top:10px;display:none}
#app{display:none;position:relative;z-index:1;min-height:100vh}
header{background:rgba(13,22,38,.96);border-bottom:1px solid var(--border);padding:13px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.hinner{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo h1{font-size:15px;font-weight:900;line-height:1.2}
.logo span{font-size:10px;color:var(--text2)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-right:8px}
.bc-item{cursor:pointer;transition:color .2s;font-weight:600}
.bc-item:hover{color:var(--accent)}
.bc-item.active{color:var(--text);cursor:default}
.bc-sep{color:var(--text3)}
.role-badge{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700}
.role-admin{background:rgba(255,171,0,.12);color:var(--orange);border:1px solid rgba(255,171,0,.25)}
.role-viewer{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.ml{margin-right:auto}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,87,231,.4)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.btn-green:hover{background:rgba(0,230,118,.18)}
.btn-orange{background:rgba(255,171,0,.1);color:var(--orange);border:1px solid rgba(255,171,0,.2)}
.btn-orange:hover{background:rgba(255,171,0,.18)}
.btn-sm{padding:5px 10px;font-size:11px}
.container{max-width:1400px;margin:0 auto;padding:24px 20px 60px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s}
.sc::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--c,var(--accent))}
.sc:hover{border-color:var(--c,var(--accent))}
.sc-label{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sc-val{font-size:24px;font-weight:900;color:var(--c,var(--accent));line-height:1}
.sc-sub{font-size:10px;color:var(--text3);margin-top:3px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.filter-btn{padding:6px 13px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.search{display:flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:7px 12px;margin-right:auto}
.search input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Cairo',sans-serif;font-size:12px;width:160px}
.search input::placeholder{color:var(--text3)}
.section-title{font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:30px}
.proj-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc,var(--accent2))}
.proj-card:hover{border-color:var(--pc,var(--accent2));transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.proj-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.proj-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,.05)}
.proj-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s}
.proj-card:hover .proj-actions{opacity:1}
.icon-btn{background:transparent;border:none;cursor:pointer;padding:5px 6px;border-radius:6px;font-size:13px;color:var(--text2);transition:all .2s}
.icon-btn:hover{background:var(--s2);color:var(--text)}
.proj-name{font-size:14px;font-weight:800;margin-bottom:4px}
.proj-desc{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.6;min-height:18px}
.proj-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.proj-stat{font-size:10px;color:var(--text2)}
.proj-prog-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.proj-prog-fill{height:100%;border-radius:2px;transition:width .4s}
.proj-prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
#tasksView{display:none}
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;background:var(--s1);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;margin-bottom:20px;transition:all .2s;border:none}
.back-btn:hover{color:var(--accent)}
.proj-header-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.proj-header-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc,var(--accent2))}
.phc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:23px;background:rgba(255,255,255,.05);flex-shrink:0}
.phc-info{flex:1}
.phc-name{font-size:17px;font-weight:900;margin-bottom:3px}
.phc-desc{font-size:12px;color:var(--text2)}
.phc-stats{display:flex;gap:16px}
.phc-stat{text-align:center}
.phc-stat-val{font-size:20px;font-weight:900;color:var(--accent)}
.phc-stat-label{font-size:10px;color:var(--text3)}
.board{display:flex;flex-direction:column;gap:10px}
.task-card{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:all .25s}
.task-card:hover{border-color:rgba(0,198,255,.2);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.task-head{padding:13px 16px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.task-head:hover{background:rgba(255,255,255,.015)}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 5px currentColor}
.prio-high{color:var(--red)}.prio-medium{color:var(--orange)}.prio-low{color:var(--green)}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:700;margin-bottom:3px}
.task-sub{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:7px;font-size:10px;font-weight:700;border:1px solid transparent}
.s-done{background:rgba(0,230,118,.1);color:var(--green);border-color:rgba(0,230,118,.2)}
.s-active{background:rgba(0,198,255,.1);color:var(--accent);border-color:rgba(0,198,255,.2)}
.s-pending{background:rgba(255,171,0,.1);color:var(--orange);border-color:rgba(255,171,0,.2)}
.s-blocked{background:rgba(255,77,77,.1);color:var(--red);border-color:rgba(255,77,77,.2)}
.s-planned{background:rgba(167,139,250,.1);color:var(--purple);border-color:rgba(167,139,250,.2)}
.p-wrap{display:flex;align-items:center;gap:8px;min-width:130px}
.pbar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s}
.ppct{font-size:11px;font-weight:800;color:var(--accent);min-width:30px}
.owner-chip{display:flex;align-items:center;gap:5px}
.av{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;border:2px solid var(--bg);flex-shrink:0}
.task-acts{display:flex;gap:4px;align-items:center}
.chevron{color:var(--text3);font-size:11px;transition:transform .3s;flex-shrink:0}
.task-card.expanded .chevron{transform:rotate(180deg)}
.phases-wrap{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.task-card.expanded .phases-wrap{display:block}
.ph-title{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:12px 0 10px}
.ph-timeline{position:relative}
.ph-timeline::before{content:'';position:absolute;right:11px;top:13px;bottom:13px;width:2px;background:var(--border);z-index:0}
.ph-row{display:flex;align-items:flex-start;gap:12px;padding:7px 0}
.ph-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;position:relative;z-index:1;border:2px solid}
.pd-done{background:rgba(0,230,118,.1);border-color:var(--green);color:var(--green)}
.pd-active{background:rgba(0,198,255,.1);border-color:var(--accent);color:var(--accent)}
.pd-pending{background:rgba(255,171,0,.1);border-color:var(--orange);color:var(--orange)}
.pd-blocked{background:rgba(255,77,77,.1);border-color:var(--red);color:var(--red)}
.pd-planned{background:rgba(167,139,250,.1);border-color:var(--purple);color:var(--purple)}
.ph-content{flex:1;min-width:0}
.ph-hd{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.ph-name{font-size:13px;font-weight:700}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--s2);border-radius:8px;padding:10px}
.ph-item label{font-size:9px;color:var(--text3);display:block;margin-bottom:2px}
.ph-item span{font-size:11px;color:var(--text);font-weight:600}
.ph-sel{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:3px 7px;color:var(--text);font-family:'Cairo',sans-serif;font-size:11px;outline:none;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:18px;width:92%;max-width:680px;max-height:92vh;overflow-y:auto;padding:26px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-title{font-size:16px;font-weight:900;margin-bottom:20px;color:var(--accent)}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--text2);font-weight:700}
.fg input,.fg select{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:12px;outline:none;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--accent2)}
.fg select option{background:var(--s1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.span2{grid-column:1/-1}
.ph-builder{margin-top:16px}
.ph-builder-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ph-builder-hd span{font-size:13px;font-weight:700}
.ph-inp{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;position:relative}
.ph-num{position:absolute;top:9px;right:9px;width:20px;height:20px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.ph-inp-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;padding-top:6px}
.ph-del{position:absolute;top:9px;left:9px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px}
.ph-del:hover{color:var(--red)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;border-top:1px solid var(--border);padding-top:16px}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cp-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.cp-dot.selected{border-color:#fff;transform:scale(1.2)}
.empty{text-align:center;padding:50px;color:var(--text3)}
.empty div{font-size:42px;margin-bottom:12px}
.all-tasks-section{margin-top:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s1);border:1px solid var(--border2);border-radius:10px;padding:11px 22px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.projects-grid{grid-template-columns:1fr}.p-wrap,.phc-stats{display:none}.ph-grid{grid-template-columns:1fr 1fr}.ph-inp-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>

      <button class="filter-btn" onclick="setFilter('done',this)">🟢 منتهية</button>
      <button class="filter-btn" onclick="setFilter('planned',this)">🟣 مخططة</button>
      <div class="search"><span>🔍</span><input type="text" placeholder="بحث في المشاريع..." oninput="setSearch(this.value)"></div>
    </div>
    <div class="section-title">📁 المشاريع</div>
    <div class="projects-grid" id="projectsGrid"></div>
    <div class="all-tasks-section">
      <div class="section-title">📋 جميع المهام <span style="color:var(--text3);font-size:10px;font-weight:400;text-transform:none;letter-spacing:0">(اضغط على مشروع لعرض مهامه فقط)</span></div>
      <div class="toolbar" style="margin-bottom:12px">
        <button class="filter-btn active" onclick="setAllTaskFilter('all',this)">الكل</button>
        <button class="filter-btn" onclick="setAllTaskFilter('active',this)">🔵 جارية</button>
        <button class="filter-btn" onclick="setAllTaskFilter('pending',this)">🟡 معلقة</button>
        <button class="filter-btn" onclick="setAllTaskFilter('done',this)">🟢 مكتملة</button>
        <button class="filter-btn" onclick="setAllTaskFilter('blocked',this)">🔴 موقوفة</button>
        <button class="filter-btn" onclick="setAllTaskFilter('planned',this)">🟣 مخططة</button>
      </div>
      <div class="board" id="allTasksBoard"></div>
    </div>
  </div>

  <div id="tasksView">
    <button class="back-btn" onclick="goHome()">← رجوع للمشاريع</button>
    <div class="proj-header-card" id="projHeaderCard"></div>
    <div class="toolbar">
      <button class="filter-btn active" onclick="setTaskFilter('all',this)">الكل</button>
      <button class="filter-btn" onclick="setTaskFilter('active',this)">🔵 جارية</button>
      <button class="filter-btn" onclick="setTaskFilter('pending',this)">🟡 معلقة</button>
      <button class="filter-btn" onclick="setTaskFilter('done',this)">🟢 مكتملة</button>
      <button class="filter-btn" onclick="setTaskFilter('blocked',this)">🔴 موقوفة</button>
      <button class="filter-btn" onclick="setTaskFilter('planned',this)">🟣 مخططة</button>
      <div class="search"><span>🔍</span><input type="text" placeholder="بحث في المهام..." oninput="setTaskSearch(this.value)"></div>
    </div>
    <div class="board" id="projTasksBoard"></div>
  </div>
</div>
</div>

<!-- PROJECT MODAL -->
<div class="overlay" id="projModal">
  <div class="modal">
    <div class="modal-title" id="projModalTitle">📁 مشروع جديد</div>
    <div class="form-grid">
      <div class="fg span2"><label>اسم المشروع *</label><input id="pName" placeholder="مثال: مشروع الحزام الصناعي"></div>
      <div class="fg span2"><label>الوصف</label><input id="pDesc" placeholder="وصف مختصر"></div>
      <div class="fg"><label>الحالة</label>
        <select id="pStatus"><option value="planned">🟣 مخططة</option><option value="active" selected>🔵 نشطة</option><option value="done">🟢 منتهية</option></select>
      </div>
      <div class="fg"><label>الأيقونة</label><input id="pIcon" placeholder="🏗️" maxlength="2" value="📁"></div>
      <div class="fg span2"><label>لون المشروع</label><div class="color-picker" id="colorPicker"></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('projModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveProject()">✅ حفظ</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="taskModal">
  <div class="modal">
    <div class="modal-title" id="taskModalTitle">➕ مهمة جديدة</div>
    <div class="form-grid">
      <div class="fg span2"><label>اسم المهمة *</label><input id="tName" placeholder="مثال: تمديد كابل فايبر — المنطقة A"></div>
      <div class="fg"><label>المشروع</label><select id="tProject"></select></div>
      <div class="fg"><label>المسؤول الرئيسي</label><input id="tOwner" placeholder="الاسم"></div>
      <div class="fg"><label>الأولوية</label>
        <select id="tPrio"><option value="high">🔴 عالية</option><option value="medium" selected>🟡 متوسطة</option><option value="low">🟢 منخفضة</option></select>
      </div>
      <div class="fg"><label>الحالة</label>
        <select id="tStatus"><option value="planned">🟣 مخططة</option><option value="active" selected>🔵 جارية</option><option value="pending">🟡 معلقة</option><option value="done">🟢 مكتملة</option><option value="blocked">🔴 موقوفة</option></select>
      </div>
    </div>
    <div class="ph-builder">
      <div class="ph-builder-hd"><span>⚙️ مراحل التنفيذ</span><button class="btn btn-ghost btn-sm" onclick="addPhInput()">＋ مرحلة</button></div>
      <div id="phInputs"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('taskModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveTask()">✅ حفظ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ROLES={admin:'admin100100',viewer:'user123'};
const COLORS=['#0057e7','#00bfa5','#ff6b35','#a78bfa','#00e676','#ffab00','#ff4d4d','#00c6ff','#f06292'];
const SL={done:'مكتملة',active:'جارية',pending:'معلقة',blocked:'موقوفة',planned:'مخططة'};
const PL={active:'نشطة',done:'منتهية',planned:'مخططة'};
const AVC=['#0057e7','#00c6ff','#00e676','#ffab00','#a78bfa','#ff4d4d','#00bcd4','#ff6b9d'];

let currentRole='viewer',loginTarget='admin';
// v4 - reset from v3
if(!localStorage.getItem('fiberData_v4')) localStorage.removeItem('fiberData_v3');
let data=JSON.parse(localStorage.getItem('fiberData_v4')||'null')||getDemo();
let currentView='projects',currentProjectId=null;
let filter='all',search='',taskFilter='all',taskSearch='',allTaskFilter='all';
let editProjId=null,editTaskId=null,phCount=0,selColor=COLORS[0];

function save(){localStorage.setItem('fiberData_v4',JSON.stringify(data));}
function ini(n){if(!n)return'?';const p=n.trim().split(' ');return p.length>1?p[0][0]+p[1][0]:p[0].slice(0,2);}
function projLetter(name){
  if(!name)return'P';
  const m=name.match(/FTTH-(.)/i);
  return m?m[1].toUpperCase():name[0].toUpperCase();
}
function avc(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))%AVC.length;return AVC[h];}
function pct(ph){if(!ph||!ph.length)return 0;return Math.round(ph.filter(p=>p.status==='done').length/ph.length*100);}
function projTasks(pid){return data.tasks.filter(t=>t.projectId===pid);}

function calcDelay(planned, actual){
  if(!planned||!actual)return null;
  const p=new Date(planned), a=new Date(actual);
  return Math.round((a-p)/(1000*60*60*24));
}
function delayBadge(days){
  if(days===null)return'';
  if(days===0)return`<span style="font-size:10px;padding:1px 7px;border-radius:6px;background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);font-weight:700">✅ في الموعد</span>`;
  if(days>0)return`<span style="font-size:10px;padding:1px 7px;border-radius:6px;background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2);font-weight:700">⏰ تأخير ${days} يوم</span>`;
  return`<span style="font-size:10px;padding:1px 7px;border-radius:6px;background:rgba(0,198,255,.1);color:var(--accent);border:1px solid rgba(0,198,255,.2);font-weight:700">⚡ مبكر ${Math.abs(days)} يوم</span>`;
}
function taskDelayInfo(task){
  const phases=task.phases||[];
  if(!phases.length)return{totalDelay:null,badge:''};
  let totalDelay=0, hasDelay=false;
  phases.forEach(ph=>{
    const d=calcDelay(ph.end, ph.actualEnd);
    if(d!==null){totalDelay+=d;hasDelay=true;}
  });
  if(!hasDelay)return{totalDelay:null,badge:''};
  return{totalDelay, badge:delayBadge(totalDelay)};
}
function projPct(pid){const ts=projTasks(pid);if(!ts.length)return 0;return Math.round(ts.reduce((a,t)=>a+pct(t.phases),0)/ts.length);}

// AUTH
function setRole(r,btn){loginTarget=r;document.querySelectorAll('.login-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function doLogin(){
  const pass=document.getElementById('loginPass').value;
  if(ROLES[loginTarget]===pass){
    currentRole=loginTarget;sessionStorage.setItem('fiberRole',currentRole);
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();renderAll();
  } else {
    document.getElementById('loginErr').style.display='block';
    setTimeout(()=>document.getElementById('loginErr').style.display='none',2000);
  }
}
function logout(){sessionStorage.removeItem('fiberRole');document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('loginPass').value='';}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function initApp(){
  const b=document.getElementById('roleBadge');
  b.textContent=currentRole==='admin'?'👑 Admin':'👁 Viewer';
  b.className='role-badge '+(currentRole==='admin'?'role-admin':'role-viewer');
  document.getElementById('addBtn').style.display=currentRole==='admin'?'':'none';
}

// RENDER
function renderAll(){renderStats();if(currentView==='projects')renderProjects();else renderTasksView();}

function renderStats(){
  const el=document.getElementById('stats');
  el.innerHTML=`
    <div class="sc" style="--c:var(--accent)"><div class="sc-label">المشاريع</div><div class="sc-val">${data.projects.length}</div><div class="sc-sub">إجمالي</div></div>
    <div class="sc" style="--c:#00bfa5"><div class="sc-label">المهام</div><div class="sc-val">${data.tasks.length}</div><div class="sc-sub">إجمالي</div></div>
    <div class="sc" style="--c:var(--green)"><div class="sc-label">مكتملة</div><div class="sc-val">${data.tasks.filter(t=>t.status==='done').length}</div><div class="sc-sub">تم الإنجاز</div></div>
    <div class="sc" style="--c:var(--accent)"><div class="sc-label">جارية</div><div class="sc-val">${data.tasks.filter(t=>t.status==='active').length}</div><div class="sc-sub">قيد التنفيذ</div></div>
    <div class="sc" style="--c:var(--red)"><div class="sc-label">موقوفة</div><div class="sc-val">${data.tasks.filter(t=>t.status==='blocked').length}</div><div class="sc-sub">تحتاج تدخل</div></div>`;
}

function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  if(currentView==='projects'){bc.innerHTML=`<span class="bc-item active">🏠 الرئيسية</span>`;return;}
  const proj=data.projects.find(p=>p.id===currentProjectId);
  bc.innerHTML=`<span class="bc-item" onclick="goHome()">🏠 الرئيسية</span><span class="bc-sep"> › </span><span class="bc-item active">${proj?(proj.icon||'📁')+' '+proj.name:''}</span>`;
}

function renderProjects(){
  document.getElementById('projectsView').style.display='block';
  document.getElementById('tasksView').style.display='none';
  document.getElementById('addBtnText').textContent='مشروع';
  renderBreadcrumb();
  const isAdmin=currentRole==='admin';
  let projs=data.projects.filter(p=>(filter==='all'||p.status===filter)&&(!search||p.name.includes(search)||(p.desc||'').includes(search)));
  const grid=document.getElementById('projectsGrid');
  grid.innerHTML=projs.length?projs.map(p=>{
    const ts=projTasks(p.id),pp=projPct(p.id);
    return `<div class="proj-card" style="--pc:${p.color||'#0057e7'}" onclick="openProject('${p.id}')">
      <div class="proj-card-head">
        <div class="proj-icon" style="background:${p.color||'#0057e7'}22;color:${p.color||'#0057e7'};font-size:20px;font-weight:900;font-family:'Cairo',sans-serif">${projLetter(p.name)}</div>
        ${isAdmin?`<div class="proj-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openEditProject('${p.id}')">✏️</button>
          <button class="icon-btn" onclick="delProject('${p.id}')">🗑</button>
        </div>`:''}
      </div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-desc">${p.desc||''}</div>
      <div class="proj-meta">
        <span class="proj-stat">📋 ${ts.length} مهمة</span>
        <span class="badge s-${p.status}">${PL[p.status]||p.status}</span>
      </div>
      <div class="proj-prog-label"><span>الإنجاز الكلي</span><span>${pp}%</span></div>
      <div class="proj-prog-bar"><div class="proj-prog-fill" style="width:${pp}%;background:${p.color||'#0057e7'}"></div></div>
    </div>`;
  }).join(''):'<div class="empty"><div>📁</div><p>لا توجد مشاريع — أضف مشروعك الأول</p></div>';
  // Filter tasks
  let allT = data.tasks;
  if(filter !== 'all') {
    const filteredProjIds = data.projects.filter(p=>p.status===filter).map(p=>p.id);
    allT = allT.filter(t=>filteredProjIds.includes(t.projectId));
  }
  if(allTaskFilter !== 'all') allT = allT.filter(t=>t.status===allTaskFilter);
  if(search) allT = allT.filter(t=>t.name.includes(search)||(t.owner||'').includes(search)||(data.projects.find(p=>p.id===t.projectId)?.name||'').includes(search));
  renderTaskBoard(document.getElementById('allTasksBoard'),allT,true);
}

function openProject(pid){
  currentView='tasks';currentProjectId=pid;
  document.getElementById('projectsView').style.display='none';
  document.getElementById('tasksView').style.display='block';
  document.getElementById('addBtnText').textContent='مهمة';
  renderBreadcrumb();renderTasksView();
}

function renderTasksView(){
  const proj=data.projects.find(p=>p.id===currentProjectId);
  if(!proj){goHome();return;}
  const ts=projTasks(proj.id),pp=projPct(proj.id);
  const phc=document.getElementById('projHeaderCard');
  phc.style.setProperty('--pc',proj.color||'#0057e7');
  phc.innerHTML=`<div class="phc-icon" style="background:${proj.color||'#0057e7'}22;color:${proj.color||'#0057e7'};font-size:24px;font-weight:900;font-family:'Cairo',sans-serif">${projLetter(proj.name)}</div>
    <div class="phc-info"><div class="phc-name">${proj.name}</div>${proj.desc?`<div class="phc-desc">${proj.desc}</div>`:''}</div>
    <div class="phc-stats">
      <div class="phc-stat"><div class="phc-stat-val">${ts.length}</div><div class="phc-stat-label">مهمة</div></div>
      <div class="phc-stat"><div class="phc-stat-val" style="color:var(--green)">${ts.filter(t=>t.status==='done').length}</div><div class="phc-stat-label">مكتملة</div></div>
      <div class="phc-stat"><div class="phc-stat-val">${pp}%</div><div class="phc-stat-label">إنجاز</div></div>
    </div>`;
  let filtered=ts.filter(t=>(taskFilter==='all'||t.status===taskFilter)&&(!taskSearch||t.name.includes(taskSearch)||(t.owner||'').includes(taskSearch)));
  renderTaskBoard(document.getElementById('projTasksBoard'),filtered,false);
}

function goHome(){
  currentView='projects';currentProjectId=null;
  document.getElementById('projectsView').style.display='block';
  document.getElementById('tasksView').style.display='none';
  document.getElementById('addBtnText').textContent='مشروع';
  renderBreadcrumb();renderProjects();
}

function renderTaskBoard(el,tasks,showProj){
  const isAdmin=currentRole==='admin';
  if(!tasks.length){el.innerHTML='<div class="empty"><div>📋</div><p>لا توجد مهام</p></div>';return;}
  el.innerHTML=tasks.map(task=>{
    const p=pct(task.phases),col=avc(task.owner);
    const proj=data.projects.find(pr=>pr.id===task.projectId);
    return `<div class="task-card" id="tc-${task.id}">
      <div class="task-head" onclick="toggleCard('${task.id}')">
        <div class="prio-dot prio-${task.priority}">●</div>
        <div class="task-info">
          <div class="task-name">${task.name}</div>
          <div class="task-sub">
            ${showProj&&proj?`<span style="font-size:10px;display:inline-flex;align-items:center;gap:4px"><span style="width:16px;height:16px;border-radius:4px;background:${proj.color||'#0057e7'}22;color:${proj.color||'#0057e7'};font-size:9px;font-weight:900;display:inline-flex;align-items:center;justify-content:center">${projLetter(proj.name)}</span><span style="color:var(--text2)">${proj.name}</span></span>`:''}
            <span class="badge s-${task.status}">${SL[task.status]}</span>
            <span style="font-size:10px;color:var(--text3)">⚙️ ${(task.phases||[]).length} مراحل</span>
            ${taskDelayInfo(task).badge}
          </div>
        </div>
        <div class="p-wrap"><div class="pbar"><div class="pfill" style="width:${p}%"></div></div><span class="ppct">${p}%</span></div>
        <div class="owner-chip">
          <div class="av" style="background:${col}18;color:${col};border-color:${col}30">${ini(task.owner)}</div>
          <span style="font-size:10px;color:var(--text2);max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${task.owner||'—'}</span>
        </div>
        <div class="task-acts" onclick="event.stopPropagation()">
          ${isAdmin?`<button class="icon-btn" onclick="openEditTask('${task.id}')">✏️</button><button class="icon-btn" onclick="delTask('${task.id}')">🗑</button>`:''}
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="phases-wrap">${renderPhases(task.phases||[],task.id)}</div>
    </div>`;
  }).join('');
}

function renderPhases(phases,tid){
  const isAdmin=currentRole==='admin';
  if(!phases.length)return'<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px">لا توجد مراحل</div>';
  return`<p class="ph-title">مراحل التنفيذ</p><div class="ph-timeline">${phases.map((ph,pi)=>`
    <div class="ph-row">
      <div class="ph-dot pd-${ph.status}">${pi+1}</div>
      <div class="ph-content">
        <div class="ph-hd">
          <span class="ph-name">${ph.name}</span>
          <span class="badge s-${ph.status}">${SL[ph.status]}</span>
          ${isAdmin?`<select class="ph-sel" onchange="updatePhase('${tid}',${pi},this.value)">
            <option value="planned" ${ph.status==='planned'?'selected':''}>مخططة</option>
            <option value="active" ${ph.status==='active'?'selected':''}>جارية</option>
            <option value="pending" ${ph.status==='pending'?'selected':''}>معلقة</option>
            <option value="done" ${ph.status==='done'?'selected':''}>مكتملة</option>
            <option value="blocked" ${ph.status==='blocked'?'selected':''}>موقوفة</option>
          </select>`:''}
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;background:var(--s2);border-radius:8px;padding:10px">
          <div class="ph-item"><label>📅 بداية مخططة</label><span>${ph.start||'—'}</span></div>
          <div class="ph-item"><label>🏁 نهاية مخططة</label><span>${ph.end||'—'}</span></div>
          <div class="ph-item"><label>✅ بداية فعلية</label><span style="color:${ph.actualStart?'var(--green)':'var(--text3)'}">${ph.actualStart||'—'}</span></div>
          <div class="ph-item"><label>✅ نهاية فعلية</label><span style="color:${ph.actualEnd?'var(--green)':'var(--text3)'}">${ph.actualEnd||'—'}</span></div>
          <div class="ph-item"><label>👤 المسؤول</label><span>${ph.responsible||'—'}</span></div>
          <div class="ph-item"><label>⏱ التأخير</label><span>${(()=>{const d=calcDelay(ph.end,ph.actualEnd);return d===null?'<span style="color:var(--text3)">لم يُسجل بعد</span>':d===0?'<span style="color:var(--green)">في الموعد</span>':d>0?'<span style="color:var(--red)">+'+d+' يوم</span>':'<span style="color:var(--accent)">'+d+' يوم</span>';})()}</span></div>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function toggleCard(id){document.getElementById(`tc-${id}`)?.classList.toggle('expanded');}
function updatePhase(tid,pi,val){
  const task=data.tasks.find(t=>t.id===tid);if(!task)return;
  task.phases[pi].status=val;
  const ph=task.phases;
  if(ph.every(p=>p.status==='done'))task.status='done';
  else if(ph.some(p=>p.status==='blocked'))task.status='blocked';
  else if(ph.some(p=>p.status==='active'))task.status='active';
  save();renderAll();
  setTimeout(()=>document.getElementById(`tc-${tid}`)?.classList.add('expanded'),10);
  toast('✅ تم التحديث');
}

// FILTERS
function setAllTaskFilter(f,btn){
  allTaskFilter=f;
  document.querySelectorAll('#projectsView .all-tasks-section .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}
function setFilter(f,btn){filter=f;document.querySelectorAll('#projectsView .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProjects();}
function setSearch(v){search=v;renderProjects();}
function setTaskFilter(f,btn){taskFilter=f;document.querySelectorAll('#tasksView .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTasksView();}
function setTaskSearch(v){taskSearch=v;renderTasksView();}

// PROJECT MODAL
function openAddModal(){if(currentView==='projects')openAddProject();else openAddTask();}
function openAddProject(){
  editProjId=null;selColor=COLORS[0];
  ['pName','pDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pStatus').value='active';
  document.getElementById('pIcon').value='📁';
  document.getElementById('projModalTitle').textContent='📁 مشروع جديد';
  renderColorPicker();openModal('projModal');
}
function openEditProject(id){
  const FIXED=['p1','p2','p3'];
  const p=data.projects.find(pr=>pr.id===id);if(!p)return;
  editProjId=id;selColor=p.color||COLORS[0];
  document.getElementById('pName').value=p.name;
  document.getElementById('pDesc').value=p.desc||'';
  document.getElementById('pStatus').value=p.status;
  document.getElementById('pIcon').value=p.icon||'📁';
  document.getElementById('projModalTitle').textContent='✏️ تعديل المشروع';
  // Lock name for fixed projects
  const nameInput=document.getElementById('pName');
  if(FIXED.includes(id)){
    nameInput.readOnly=true;
    nameInput.style.opacity='0.5';
    nameInput.title='اسم هذا المشروع ثابت';
  } else {
    nameInput.readOnly=false;
    nameInput.style.opacity='1';
    nameInput.title='';
  }
  renderColorPicker();openModal('projModal');
}
function renderColorPicker(){
  document.getElementById('colorPicker').innerHTML=COLORS.map(c=>`<div class="cp-dot${c===selColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
}
function selectColor(c){selColor=c;renderColorPicker();}
function saveProject(){
  const name=document.getElementById('pName').value.trim();
  if(!name){toast('⚠️ أدخل اسم المشروع');return;}
  if(editProjId){
    const p=data.projects.find(pr=>pr.id===editProjId);
    if(p){Object.assign(p,{name,desc:document.getElementById('pDesc').value.trim(),status:document.getElementById('pStatus').value,icon:document.getElementById('pIcon').value||'📁',color:selColor});}
  } else {
    data.projects.push({id:'p'+Date.now(),name,desc:document.getElementById('pDesc').value.trim(),status:document.getElementById('pStatus').value,icon:document.getElementById('pIcon').value||'📁',color:selColor,createdAt:new Date().toISOString()});
  }
  save();renderAll();closeModal('projModal');toast(editProjId?'✅ تم التعديل':'✅ تم إضافة المشروع');
}
function delProject(id){
  const FIXED=['p1','p2','p3'];
  if(FIXED.includes(id)){toast('⚠️ هذا المشروع ثابت ولا يمكن حذفه');return;}
  const ts=projTasks(id).length;
  if(!confirm(`حذف المشروع؟${ts?'\n⚠️ يوجد '+ts+' مهمة مرتبطة به':''}`))return;
  data.projects=data.projects.filter(p=>p.id!==id);
  data.tasks=data.tasks.filter(t=>t.projectId!==id);
  save();renderAll();toast('🗑 تم الحذف');
}

// TASK MODAL
function openAddTask(){
  editTaskId=null;phCount=0;
  document.getElementById('phInputs').innerHTML='';
  ['tName','tOwner'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tPrio').value='medium';
  document.getElementById('tStatus').value='active';
  document.getElementById('taskModalTitle').textContent='➕ مهمة جديدة';
  populateProjectSelect(currentProjectId);addPhInput();openModal('taskModal');
}
function openEditTask(id){
  const t=data.tasks.find(tk=>tk.id===id);if(!t)return;
  editTaskId=id;phCount=0;document.getElementById('phInputs').innerHTML='';
  document.getElementById('tName').value=t.name;
  document.getElementById('tOwner').value=t.owner||'';
  document.getElementById('tPrio').value=t.priority;
  document.getElementById('tStatus').value=t.status;
  document.getElementById('taskModalTitle').textContent='✏️ تعديل المهمة';
  populateProjectSelect(t.projectId);
  (t.phases||[]).forEach(ph=>addPhInput(ph));
  if(!t.phases||!t.phases.length)addPhInput();
  openModal('taskModal');
}
function populateProjectSelect(selId){
  const sel=document.getElementById('tProject');
  sel.innerHTML=data.projects.length?data.projects.map(p=>`<option value="${p.id}"${p.id===selId?' selected':''}>${p.icon||'📁'} ${p.name}</option>`).join(''):'<option value="">لا توجد مشاريع</option>';
}
function addPhInput(d={}){
  phCount++;
  const c=document.getElementById('phInputs');
  const div=document.createElement('div');
  div.className='ph-inp';div.id=`pi-${phCount}`;
  div.innerHTML=`<span class="ph-num">${phCount}</span>
    <button class="ph-del" onclick="this.closest('.ph-inp').remove()">✕</button>
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;padding-top:6px">
      <div class="fg"><label>اسم المرحلة</label><input id="pi${phCount}-n" value="${d.name||''}" placeholder="المسح الميداني..."></div>
      <div class="fg"><label>المسؤول</label><input id="pi${phCount}-r" value="${d.responsible||''}" placeholder="الاسم"></div>
      <div class="fg"><label>الأولوية</label>
        <select id="pi${phCount}-st">
          <option value="planned"${(d.status||'planned')==='planned'?' selected':''}>مخططة</option>
          <option value="active"${d.status==='active'?' selected':''}>جارية</option>
          <option value="pending"${d.status==='pending'?' selected':''}>معلقة</option>
          <option value="done"${d.status==='done'?' selected':''}>مكتملة</option>
          <option value="blocked"${d.status==='blocked'?' selected':''}>موقوفة</option>
        </select>
      </div>
      <div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:8px">
      <div class="fg"><label>📅 بداية مخططة</label><input type="date" id="pi${phCount}-s" value="${d.start||''}"></div>
      <div class="fg"><label>🏁 نهاية مخططة</label><input type="date" id="pi${phCount}-e" value="${d.end||''}"></div>
      <div class="fg"><label>✅ بداية فعلية</label><input type="date" id="pi${phCount}-as" value="${d.actualStart||''}"></div>
      <div class="fg"><label>✅ نهاية فعلية</label><input type="date" id="pi${phCount}-ae" value="${d.actualEnd||''}"></div>
    </div>
`;
  c.appendChild(div);
}
function saveTask(){
  const name=document.getElementById('tName').value.trim();
  if(!name){toast('⚠️ أدخل اسم المهمة');return;}
  const phases=[];
  document.querySelectorAll('.ph-inp').forEach(row=>{
    const id=row.id.split('-')[1];
    const n=document.getElementById(`pi${id}-n`)?.value.trim();
    if(n)phases.push({name:n,start:document.getElementById(`pi${id}-s`)?.value||'',end:document.getElementById(`pi${id}-e`)?.value||'',actualStart:document.getElementById(`pi${id}-as`)?.value||'',actualEnd:document.getElementById(`pi${id}-ae`)?.value||'',responsible:document.getElementById(`pi${id}-r`)?.value.trim()||'',status:document.getElementById(`pi${id}-st`)?.value||'planned'});
  });
  const task={id:editTaskId||'t'+Date.now(),name,projectId:document.getElementById('tProject').value,owner:document.getElementById('tOwner').value.trim(),priority:document.getElementById('tPrio').value,status:document.getElementById('tStatus').value,phases,createdAt:new Date().toISOString()};
  if(editTaskId){const i=data.tasks.findIndex(t=>t.id===editTaskId);if(i>=0)data.tasks[i]=task;}
  else data.tasks.push(task);
  save();renderAll();closeModal('taskModal');toast(editTaskId?'✅ تم التعديل':'✅ تم إضافة المهمة');
}
function delTask(id){
  if(!confirm('حذف هذه المهمة؟'))return;
  data.tasks=data.tasks.filter(t=>t.id!==id);
  save();renderAll();toast('🗑 تم الحذف');
}

// MODALS
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// EXPORT
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const rows=[['المشروع','المهمة','المسؤول','الأولوية','الحالة','الإنجاز%','#','المرحلة','مسؤول المرحلة','البداية','النهاية','حالة المرحلة']];
  data.tasks.forEach(t=>{
    const proj=data.projects.find(p=>p.id===t.projectId);
    const PRI={high:'عالية',medium:'متوسطة',low:'منخفضة'};
    if((t.phases||[]).length)t.phases.forEach((ph,pi)=>rows.push([proj?.name||'—',t.name,t.owner||'—',PRI[t.priority],SL[t.status],pct(t.phases)+'%',pi+1,ph.name,ph.responsible||'—',ph.start||'—',ph.end||'—',SL[ph.status]]));
    else rows.push([proj?.name||'—',t.name,t.owner||'—',PRI[t.priority],SL[t.status],pct(t.phases)+'%','','','','','','']);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:20},{wch:35},{wch:15},{wch:10},{wch:10},{wch:8},{wch:4},{wch:30},{wch:15},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'تقرير المهام');
  XLSX.writeFile(wb,`تقرير-المكتب-الفني-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('📊 تم تصدير Excel');
}

  </div>`;
  data.projects.forEach(proj=>{
    const ts=projTasks(proj.id);
    html+=`<h2>${proj.icon||'📁'} ${proj.name}</h2><table><thead><tr><th>#</th><th>المهمة</th><th>المسؤول</th><th>الحالة</th><th>الإنجاز</th><th>المراحل</th></tr></thead><tbody>`;
    ts.forEach((t,i)=>{html+=`<tr><td>${i+1}</td><td><b>${t.name}</b></td><td>${t.owner||'—'}</td><td><span class="badge s-${t.status}">${SL[t.status]}</span></td><td>${pct(t.phases)}%</td><td>${(t.phases||[]).map((ph,pi)=>`<div style="padding:2px 0">${pi+1}. ${ph.name} — <span class="badge s-${ph.status}">${SL[ph.status]}</span></div>`).join('')}</td></tr>`;});
    html+=`</tbody></table>`;
  });
  html+='</body></html>';
  w.document.write(html);w.document.close();toast('🖨 تم فتح الطباعة');
}
